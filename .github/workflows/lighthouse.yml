name: Lighthouse CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # 手動実行を許可

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://docuflow-azure.vercel.app/
            https://docuflow-azure.vercel.app/auth/login
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Format Lighthouse Score
        id: format_score
        if: always()
        run: |
          echo "## 🔦 Lighthouse Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Score | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|:-------|:------|:-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | TBD | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | TBD | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Best Practices | TBD | - |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO | TBD | - |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "詳細は Artifacts から確認できます。" >> $GITHUB_STEP_SUMMARY

  lighthouse-check:
    name: Lighthouse Score Check
    runs-on: ubuntu-latest
    needs: lighthouse
    if: always()

    steps:
      - name: Check Lighthouse Results
        run: |
          echo "✅ Lighthouse audit completed."
          echo "目標スコア: Performance 80+, Accessibility 80+, Best Practices 80+, SEO 80+"
          echo ""
          echo "※ 実際のスコアは Lighthouse CI の Artifacts を確認してください。"






